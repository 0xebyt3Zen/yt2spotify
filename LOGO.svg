<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Filtro de Brilho Neon Rosa -->
    <filter id="neonGlowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Filtro de Brilho Neon ciano -->
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradiente Cyberpunk Dinâmico -->
    <linearGradient id="cyberGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#00f5ff" />
    </linearGradient>
  </defs>
  
  <!-- Fundo Dark Cyberpunk -->
  <rect width="512" height="512" rx="96" fill="#0b0c10"/>
  
  <!-- Linhas de Grade de Fundo (Grid de Terminal) -->
  <path d="M0 64 H512 M0 128 H512 M0 192 H512 M0 256 H512 M0 320 H512 M0 384 H512 M0 448 H512" stroke="#1f2833" stroke-width="1" opacity="0.3"/>
  <path d="M64 0 V512 M128 0 V512 M192 0 V512 M256 0 V512 M320 0 V512 M384 0 V512 M448 0 V512" stroke="#1f2833" stroke-width="1" opacity="0.3"/>
  
  <!-- Círculo Externo - Lado Ciano (Spotify/HUD) -->
  <path d="M 390 256 A 134 134 0 0 1 140 350" fill="none" stroke="#00f5ff" stroke-width="18" stroke-linecap="round" filter="url(#neonGlowCyan)"/>
  
  <!-- Círculo Externo - Lado Rosa (YouTube/Glitch) -->
  <path d="M 122 256 A 134 134 0 0 1 372 162" fill="none" stroke="#ff007f" stroke-width="18" stroke-linecap="round" filter="url(#neonGlowPink)"/>
  
  <!-- Detalhes de Interface Tecnológica (HUD) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#1f2833" stroke-width="4" stroke-dasharray="20 15"/>
  <rect x="110" y="248" width="24" height="16" fill="#00f5ff" opacity="0.8"/>
  <rect x="378" y="248" width="24" height="16" fill="#ff007f" opacity="0.8"/>
  
  <!-- Triângulo Central Estilizado (Play/Sincronia) com Efeito Recortado -->
  <g filter="url(#neonGlowPink)">
    <polygon points="210,176 210,336 330,256" fill="url(#cyberGradient)"/>
  </g>
  
  <!-- Linha de Glitch Digital Cortando o Centro -->
  <rect x="180" y="270" width="160" height="6" fill="#0b0c10"/>
  <rect x="230" y="270" width="40" height="6" fill="#00f5ff" filter="url(#neonGlowCyan)"/>
</svg>
